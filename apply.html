<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply – Premier AI Transformation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="logo">Premier AI</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="apply.html" class="btn">Apply Now</a>
    </nav>
  </nav>

  <div class="form-wrap">
    <h2>Apply for AI Transformation</h2>
    <p style="color:#9ca3af;margin-bottom:32px;">Answer a few quick questions so we can evaluate your fit and build a custom roadmap.</p>

    <form id="form" class="card">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Smith" required />
      </div>

      <div class="form-group">
        <label for="email">Business Email</label>
        <input type="email" id="email" name="email" placeholder="jane@company.com" required />
      </div>

      <div class="form-group">
        <label for="revenue">Annual Revenue ($)</label>
        <input type="number" id="revenue" name="revenue" placeholder="500000" min="0" required />
      </div>

      <div class="form-group">
        <label for="urgency">How urgent is AI implementation? (1 = not urgent, 10 = critical)</label>
        <input type="number" id="urgency" name="urgency" min="1" max="10" placeholder="7" required />
      </div>

      <div class="form-group">
        <label for="ai">Current AI usage level? (1 = none, 10 = advanced)</label>
        <input type="number" id="ai" name="ai" min="1" max="10" placeholder="2" required />
      </div>

      <div class="form-group">
        <label for="budget">Monthly budget available for AI ($)</label>
        <input type="number" id="budget" name="budget" min="0" placeholder="3000" required />
      </div>

      <div class="form-group">
        <label for="challenge">What is your biggest business challenge right now?</label>
        <textarea id="challenge" name="challenge" rows="4" placeholder="Describe your main bottleneck or growth challenge..."></textarea>
      </div>

      <button type="submit" class="btn" style="width:100%;">Submit Application</button>
    </form>

    <div id="result"></div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; <span id="footer-year"></span> Premier AI Transformation. All rights reserved.</p>
  </footer>

  <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
  <script src="js/main.js"></script>
  <script src="js/intake.js"></script>
</body>
</html>
